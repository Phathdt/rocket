# Traefik static configuration — read once at startup.
# Routers/services/middlewares live in the hot-reloaded dynamic/ directory.

entryPoints:
  web:
    address: ":80"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

api:
  dashboard: true
  insecure: true

log:
  level: INFO

accessLog: {}
